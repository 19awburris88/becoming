<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Primary Meta -->
    <title>Love Ledger — The CRM for the people you love</title>
    <meta name="description" content="A private system for remembering what matters most. Birthdays, favorites, gift ideas, milestones — all in one place. Never miss what matters." />
    <meta name="keywords" content="relationship CRM, personal CRM, birthday reminder, gift tracker, memory vault, relationship app, family organizer" />
    <meta name="author" content="Love Ledger" />
    <meta name="theme-color" content="#1C2B3A" />
    <link rel="canonical" href="https://loveled.ger" />

    <!-- Open Graph -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://loveled.ger" />
    <meta property="og:title" content="Love Ledger — The CRM for the people you love" />
    <meta property="og:description" content="Never miss a birthday, always find the right gift, and stay intentional with the relationships that matter most. Free to start." />
    <meta property="og:image" content="https://loveled.ger/og-image.png" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:site_name" content="Love Ledger" />
    <meta property="og:locale" content="en_US" />

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:site" content="@loveledger" />
    <meta name="twitter:title" content="Love Ledger — The CRM for the people you love" />
    <meta name="twitter:description" content="Never miss a birthday, always find the right gift. A private system for the relationships that matter most." />
    <meta name="twitter:image" content="https://loveled.ger/og-image.png" />

    <!-- Favicon & Icons -->
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
    <link rel="manifest" href="/site.webmanifest" />

    <!-- Structured Data -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "SoftwareApplication",
      "name": "Love Ledger",
      "description": "A private personal relationship management system. Remember birthdays, track gift ideas, save memories, and stay intentional with the people who matter most.",
      "applicationCategory": "LifestyleApplication",
      "operatingSystem": "Web",
      "offers": {
        "@type": "Offer",
        "price": "0",
        "priceCurrency": "USD"
      },
      "aggregateRating": {
        "@type": "AggregateRating",
        "ratingValue": "4.9",
        "reviewCount": "142"
      }
    }
    </script>

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Lora:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet" />

    <style>
      *, *::before, *::after { box-sizing: border-box; }
      html { scroll-behavior: smooth; }
      body { margin: 0; -webkit-font-smoothing: antialiased; }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
